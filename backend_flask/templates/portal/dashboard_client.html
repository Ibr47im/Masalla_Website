{% extends 'portal/base_portal.html' %}

{% block title %}Dashboard · Client{% endblock %}

{% block content %}
<div class="portal-dash">
  <header class="portal-dash-head">
    <p class="portal-dash-eyebrow">Client{% if user.floor %} · Floor {{ user.floor }}{% endif %}</p>
    <h1>Welcome, {{ user.username }}.</h1>
  </header>

  <section class="portal-card-grid">
    <a href="{{ url_for('portal.notes.notes_list') }}" class="portal-card portal-card-link">
      <h3>Delivery Notes</h3>
      <p>Pending notes need your confirmation. History below.</p>
    </a>
  </section>
</div>
{% endblock %}
